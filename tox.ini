[tox]
envlist=bluecheck,doc8,flake8,rstcheck,docs,py310,py311,py312,py313,py314
skip_missing_interpreters=True

[testenv]
commands=pytest
deps=
    pytest
    pytest-cov

[pytest]
addopts=
    --cov blue
    --cov-branch
testpaths=blue docs tests

[testenv:blue]
commands=blue blue docs tests/test_blue.py

[testenv:bluecheck]
commands=blue --check --diff blue docs tests/test_blue.py

[testenv:docs]
allowlist_externals=make
changedir=docs
commands=make html
deps=sphinx

[testenv:doc8]
deps=doc8
commands=doc8 docs

[testenv:flake8]
deps=flake8
commands=flake8 blue tests/test_blue.py

[testenv:rstcheck]
deps=rstcheck
commands=rstcheck --report-level warning README.rst

[flake8]
ignore=
    E124
    E203
    E303
    E402
    W503
max-line-length=88
