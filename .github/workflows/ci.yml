name: CI

on:
- push
- pull_request
- workflow_dispatch

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        check: [bluecheck, doc8, flake8, rstcheck, docs]
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install tox
      - name: Run checks with tox
        run: |
          tox -e ${{ matrix.check }}

  test:
    runs-on: ubuntu-latest
    name: Test with Python ${{ matrix.python }}
    strategy:
      matrix:
        python: ['3.10', '3.11', '3.12', '3.13', '3.14', '3.15-dev']
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install tox
      - name: Test with tox
        run: |
            tox -e py
